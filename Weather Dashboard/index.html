<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skycast · weather dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1c2f 0%, #1b3b4f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .dashboard {
      max-width: 950px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem;
      box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
      padding: 2rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.8rem;
    }

    h1 span {
      background: #ffd966c0;
      color: #0b1c2f;
      font-size: 0.9rem;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    /* search section */
    .search-section {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    #cityInput {
      flex: 1 1 260px;
      padding: 1.1rem 1.8rem;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      font-size: 1.2rem;
      color: white;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: 0.2s;
    }

    #cityInput::placeholder {
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
    }

    #cityInput:focus {
      outline: 2px solid #7aaae0;
      background: rgba(255, 255, 255, 0.15);
      border-color: transparent;
    }

    #searchBtn {
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 0 2.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.2rem;
      color: #0e2d42;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 20px -8px #030b14;
      border: 1px solid rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
    }

    #searchBtn:hover {
      background: white;
      transform: scale(1.02);
      color: #0b2c3f;
    }

    /* error message */
    .error-message {
      background: rgba(255, 100, 100, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 160, 160, 0.4);
      color: #ffdede;
      padding: 1rem 2rem;
      border-radius: 60px;
      margin-bottom: 1.8rem;
      font-weight: 500;
      text-align: center;
      animation: gentleShake 0.4s ease;
    }

    @keyframes gentleShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    /* current weather card */
    .current-weather {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem 2.2rem;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 30px -12px #030712;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2rem 2.5rem;
    }

    .weather-icon-large {
      font-size: 5.5rem;
      line-height: 1;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.4));
      animation: float 4s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-7px); }
      100% { transform: translateY(0px); }
    }

    .weather-details {
      flex: 1;
    }

    .city-name {
      font-size: 2.2rem;
      font-weight: 600;
      color: white;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .city-name small {
      font-size: 1rem;
      font-weight: 400;
      background: rgba(255,255,255,0.15);
      padding: 0.2rem 1rem;
      border-radius: 60px;
      color: #d5ecff;
    }

    .temp-main {
      font-size: 4rem;
      font-weight: 500;
      color: white;
      line-height: 1.1;
      margin: 0.2rem 0 0.5rem;
    }

    .condition-text {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.8);
      text-transform: capitalize;
      margin-bottom: 1rem;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem 2.5rem;
      color: rgba(255,255,255,0.8);
      font-size: 1.15rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 1rem 1.5rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .detail-meta div {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* 5-day forecast */
    .forecast-title {
      color: white;
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 1.4rem;
      letter-spacing: -0.01em;
      opacity: 0.9;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .forecast-card {
      background: rgba(10, 30, 40, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.4rem 1rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.2s;
      animation: fadeUp 0.5s ease backwards;
      box-shadow: 0 12px 18px -12px black;
    }

    .forecast-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.3);
      background: rgba(20, 45, 60, 0.7);
    }

    .forecast-day {
      font-weight: 600;
      color: #c7e5ff;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .forecast-icon {
      font-size: 3rem;
      line-height: 1;
      margin: 0.2rem 0;
      filter: drop-shadow(0 4px 4px #00000050);
      animation: miniFloat 3s infinite;
    }

    @keyframes miniFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }

    .forecast-temp {
      font-size: 1.6rem;
      font-weight: 600;
      color: white;
    }

    .forecast-desc {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      text-transform: capitalize;
      margin-top: 0.3rem;
    }

    /* loading shimmer */
    .loading-placeholder {
      text-align: center;
      color: rgba(255,255,255,0.5);
      padding: 3rem;
      font-size: 1.3rem;
    }

    /* footer */
    .credit {
      margin-top: 2.2rem;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    /* responsiveness */
    @media (max-width: 600px) {
      .dashboard { padding: 1.5rem; }
      h1 { font-size: 2rem; }
      .current-weather { flex-direction: column; text-align: center; }
      .detail-meta { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>☁️ skycast <span>5-day forecast</span></h1>

    <!-- search row -->
    <div class="search-section">
      <input type="text" id="cityInput" placeholder="search city... e.g., London, Tokyo" value="Bengaluru">
      <button id="searchBtn">search</button>
    </div>

    <!-- dynamic error container -->
    <div id="errorContainer"></div>

    <!-- main weather + forecast injected via js -->
    <div id="weatherContent">
      <div class="loading-placeholder">🌤️ loading weather data ...</div>
    </div>

    <div class="credit">data · OpenWeatherMap · animations</div>
  </div>

  <script>
    (function() {
      // ---- CONFIG ----
      const API_KEY = '9b3b7c4b5f9e4f1a8a7d3e2c1b6a9d8f'; // public demo key (limited) – replace with your own if needed
      // note: this is a sample key; for production get your own from openweathermap.
      // it will work for basic demonstration but may have restrictions.

      const BASE_URL = 'https://api.openweathermap.org/data/2.5';

      // DOM elements
      const cityInput = document.getElementById('cityInput');
      const searchBtn = document.getElementById('searchBtn');
      const weatherContent = document.getElementById('weatherContent');
      const errorContainer = document.getElementById('errorContainer');

      // default city on load
      let currentCity = 'Bengaluru';

      // ---- helper: display error ----
      function showError(message) {
        errorContainer.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
        // clear any previous weather if needed (optional)
        weatherContent.innerHTML = ''; 
        // auto-fade error after 5 sec? but we keep it until next search.
      }

      function clearError() {
        errorContainer.innerHTML = '';
      }

      // ---- fetch current weather & forecast ----
      async function fetchWeatherForCity(city) {
        if (!city.trim()) {
          showError('please enter a city name');
          return;
        }

        clearError();
        weatherContent.innerHTML = `<div class="loading-placeholder">🌫️ fetching forecast for "${city}" ...</div>`;

        try {
          // 1) get coordinates via geo (to be precise and for 5-day forecast)
          const geoUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(city)}&limit=1&appid=${API_KEY}`;
          const geoRes = await fetch(geoUrl);
          
          if (!geoRes.ok) {
            // if 401/404 etc
            const errData = await geoRes.json();
            throw new Error(errData.message || `geo error (${geoRes.status})`);
          }

          const geoData = await geoRes.json();
          if (!geoData || geoData.length === 0) {
            throw new Error(`city "${city}" not found`);
          }

          const { lat, lon, name, country } = geoData[0];

          // 2) fetch current weather
          const weatherUrl = `${BASE_URL}/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
          const weatherRes = await fetch(weatherUrl);
          if (!weatherRes.ok) {
            const e = await weatherRes.json();
            throw new Error(e.message || 'current weather failed');
          }
          const weatherData = await weatherRes.json();

          // 3) fetch 5-day forecast (3-hour intervals, we will take one per day at noon)
          const forecastUrl = `${BASE_URL}/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
          const forecastRes = await fetch(forecastUrl);
          if (!forecastRes.ok) {
            const e = await forecastRes.json();
            throw new Error(e.message || 'forecast failed');
          }
          const forecastData = await forecastRes.json();

          // success: render UI
          renderDashboard(weatherData, forecastData, name, country);

        } catch (error) {
          console.error('fetch error:', error);
          showError(error.message || 'unable to load weather. check city or API key.');
          weatherContent.innerHTML = ''; // remove loading
        }
      }

      // ---- render current + 5-day forecast ----
      function renderDashboard(current, forecast, cityName, countryCode) {
        // build current weather
        const { main, weather, wind, sys } = current;
        const temp = Math.round(main.temp);
        const feels = Math.round(main.feels_like);
        const humidity = main.humidity;
        const windSpeed = (wind.speed * 3.6).toFixed(1); // m/s to km/h
        const description = weather[0].description;
        const iconCode = weather[0].icon;
        const icon = getIcon(iconCode); // map to emoji/unicode

        // get sunrise/sunset (optional)
        const sunrise = sys.sunrise ? new Date(sys.sunrise * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
        const sunset = sys.sunset ? new Date(sys.sunset * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';

        // prepare 5-day forecast (pick one per day around midday)
        const dailyMap = new Map();
        forecast.list.forEach(item => {
          const date = new Date(item.dt * 1000).toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
          if (!dailyMap.has(date) && item.dt_txt.includes('12:00')) {  // prefer noon
            dailyMap.set(date, item);
          }
        });
        // if we have less than 5, just take first 5 distinct days (fallback)
        if (dailyMap.size < 5) {
          // fallback: take first unique days
          const seen = new Set();
          forecast.list.forEach(item => {
            const date = new Date(item.dt * 1000).toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
            if (!seen.has(date) && seen.size < 5) {
              seen.add(date);
              dailyMap.set(date, item);
            }
          });
        }

        const fiveDays = Array.from(dailyMap.entries()).slice(0, 5);

        // build HTML
        let forecastHTML = '';
        fiveDays.forEach(([dayLabel, item]) => {
          const dayTemp = Math.round(item.main.temp);
          const dayIcon = getIcon(item.weather[0].icon);
          const dayDesc = item.weather[0].description;
          forecastHTML += `
            <div class="forecast-card" style="animation-delay: ${Math.random()*0.2}s">
              <div class="forecast-day">${dayLabel}</div>
              <div class="forecast-icon">${dayIcon}</div>
              <div class="forecast-temp">${dayTemp}°C</div>
              <div class="forecast-desc">${dayDesc}</div>
            </div>
          `;
        });

        const content = `
          <div class="current-weather">
            <div class="weather-icon-large">${icon}</div>
            <div class="weather-details">
              <div class="city-name">${cityName} <small>${countryCode}</small></div>
              <div class="temp-main">${temp}°C</div>
              <div class="condition-text">${description}</div>
              <div class="detail-meta">
                <div>🌡️ feels ${feels}°</div>
                <div>💧 ${humidity}%</div>
                <div>🌬️ ${windSpeed} km/h</div>
                <div>🌅 ${sunrise}</div>
                <div>🌇 ${sunset}</div>
              </div>
            </div>
          </div>

          <div class="forecast-title">📅 5‑day forecast</div>
          <div class="forecast-grid">
            ${forecastHTML}
          </div>
        `;

        weatherContent.innerHTML = content;
      }

      // map weather icon to animated emoji (better than external images)
      function getIcon(iconCode) {
        // https://openweathermap.org/weather-conditions
        const code = iconCode?.substring(0, 2);
        switch (code) {
          case '01': return '☀️'; // clear sky
          case '02': return '⛅'; // few clouds
          case '03': return '☁️'; // scattered clouds
          case '04': return '☁️☁️'; // broken clouds
          case '09': return '🌧️'; // shower rain
          case '10': return '🌦️'; // rain
          case '11': return '⛈️'; // thunderstorm
          case '13': return '❄️'; // snow
          case '50': return '🌫️'; // mist
          default: return '☁️';
        }
      }

      // ---- handle search ----
      function handleSearch() {
        const city = cityInput.value.trim();
        if (city) {
          currentCity = city;
          fetchWeatherForCity(city);
        } else {
          showError('enter a city name');
        }
      }

      searchBtn.addEventListener('click', handleSearch);
      cityInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
      });

      // load default city on page load
      window.addEventListener('load', () => {
        fetchWeatherForCity(currentCity);
      });

    })();
  </script>
</body>
</html>
